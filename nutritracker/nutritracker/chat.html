<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Health Assistant - NutriTracker</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 12px 12px 0 0;
      color: white;
    }
    .chat-header-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-header-info h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .chat-header-info p {
      margin: 2px 0 0 0;
      font-size: 12px;
      opacity: 0.9;
    }
    .chat-window {
      min-height: 400px;
      max-height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-top: none;
    }
    .message {
      margin: 12px 0;
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }
    .message.user .message-avatar {
      background: #3b82f6;
      color: white;
    }
    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
    }
    .message.assistant .message-content {
      background: white;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    .message.user .message-content {
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message-sender {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
    }
    .message.user .message-sender {
      color: rgba(255,255,255,0.8);
    }
    .chat-input-area {
      padding: 16px;
      background: white;
      border: 1px solid #e5e7eb;
      border-top: none;
      border-radius: 0 0 12px 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 24px;
      font-size: 14px;
      transition: all 0.3s;
      outline: none;
    }
    .chat-input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }
    .send-btn {
      padding: 14px 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .send-btn:active {
      transform: translateY(0);
    }
    .typing-indicator {
      display: none;
      padding: 12px 16px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      font-size: 12px;
      color: #64748b;
    }
    .typing-indicator.active {
      display: block;
    }
    .typing-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
    .quick-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .quick-question-btn {
      padding: 8px 14px;
      background: #f1f5f9;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      font-size: 12px;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-question-btn:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
    }
  </style>
</head><body>
  <div class="app">
    <div id="sidebar-mount"></div>
    <main class="main">
      <h1 class="page-title">Health Assistant</h1>
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-header-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </div>
          <div class="chat-header-info">
            <h2>NutriBot</h2>
            <p>AI Health Assistant • Online</p>
          </div>
        </div>
        <div class="chat-window" id="chatWindow"></div>
        <div class="typing-indicator" id="typingIndicator">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="chat-input-area">
          <input id="chatInput" class="chat-input" placeholder="Ask about nutrition, calories, protein, BMI, water, or meal logging..." />
          <button id="sendBtn" class="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            Send
          </button>
        </div>
        <div class="quick-questions">
          <button class="quick-question-btn" onclick="askQuestion('How many calories should I eat daily?')">Daily calories</button>
          <button class="quick-question-btn" onclick="askQuestion('What is my BMI?')">Check BMI</button>
          <button class="quick-question-btn" onclick="askQuestion('How much protein do I need?')">Protein needs</button>
          <button class="quick-question-btn" onclick="askQuestion('How much water should I drink?')">Water intake</button>
          <button class="quick-question-btn" onclick="askQuestion('What are healthy foods?')">Healthy foods</button>
          <button class="quick-question-btn" onclick="askQuestion('How to lose weight?')">Weight loss tips</button>
        </div>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
  <script>
    State.init(); mountSidebar('assistant'); initTheme();
    const chatWindow = document.getElementById('chatWindow');
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    function appendMessage(who, text) {
      const el = document.createElement('div');
      el.className = `message ${who.toLowerCase()}`;
      const avatar = who === 'Assistant' ? '🤖' : '👤';
      el.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div>
          <div class="message-sender">${who}</div>
          <div class="message-content">${text}</div>
        </div>
      `;
      chatWindow.appendChild(el);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function showTyping() {
      typingIndicator.classList.add('active');
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function hideTyping() {
      typingIndicator.classList.remove('active');
    }

    appendMessage('Assistant', '👋 Hi! I\'m NutriBot, your AI health assistant. I can help you with nutrition advice, calorie tracking, BMI calculations, protein needs, water intake, and meal logging. What would you like to know?');

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;
      appendMessage('You', msg);
      input.value = '';
      showTyping();

      try {
        const res = await fetchAPI('assistant/', { method: 'POST', body: JSON.stringify({ message: msg }) });
        hideTyping();
        if (res && res.reply) {
          appendMessage('Assistant', res.reply);
        } else {
          appendMessage('Assistant', 'I apologize, but I couldn\'t generate a response. Please try rephrasing your question.');
        }
      } catch (e) {
        hideTyping();
        console.error('Assistant error', e);
        appendMessage('Assistant', 'Sorry, I\'m having trouble connecting to the server. Please check if the backend is running and try again.');
      }
    }

    function askQuestion(question) {
      input.value = question;
      sendMessage();
    }

    btn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body></html>
