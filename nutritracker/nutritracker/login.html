<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NutriTracker</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Removed external Font Awesome CDN to avoid tracking prevention blocks; using inline SVG icons below -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .dark-mode body {
            background: #0f172a;
        }

        .dark-mode .container {
            background: #111827;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .dark-mode .tagline,
        .dark-mode .signup-link,
        .dark-mode .signup-link a {
            color: #d1d5db;
        }

        .dark-mode .form-group input {
            background: #1f2937;
            color: #e5e7eb;
            border-color: #334155;
        }

        .dark-mode .login-btn {
            background: #10b981;
            color: #fff;
        }

        .dark-mode svg {
            color: #9ca3af;
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo h1 {
            color: #2ecc71;
            font-size: 32px;
            font-weight: bold;
        }

        .tagline {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #2ecc71;
        }

        .form-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #27ae60;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .signup-link a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>NutriTracker</h1>
    </div>
    <div style="position:absolute; right:20px; top:20px;">
        <button id="loginThemeToggle" style="padding:8px 10px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;" aria-label="Toggle theme"></button>
    </div>
    <p class="tagline">Track your nutrition, stay healthy</p>

    <div class="form-group">
        <input type="text" id="username" placeholder="Username or email">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); color:#95a5a6;">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#95a5a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="7" r="4" stroke="#95a5a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <div class="form-group">
        <input type="password" id="password" placeholder="Password">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); color:#95a5a6;">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="#95a5a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#95a5a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <p class="signup-link">
        Don't have an account? <a href="signup.html">Sign up</a>
    </p>

    <p style="text-align:center; margin-top:15px; font-size:12px; color:#7f8c8d;">
        <a href="#" onclick="clearStorage(); return false;" style="color:#2ecc71; text-decoration:none;">Clear localStorage & try again</a>
    </p>

    <p style="text-align:center; margin-top:10px; font-size:12px; color:#7f8c8d;">
        <a href="#" onclick="toggleResetForm(); return false;" style="color:#3498db; text-decoration:none;">Forgot password? Reset it here</a>
    </p>

    <div id="resetPasswordBox" style="display:none; margin-top:20px; padding:16px; border:1px solid #dcdcdc; border-radius:12px; background:#f9f9f9; text-align:left;">
        <h3 style="margin:0 0 10px 0; font-size:16px;">Development password reset</h3>
        <div class="form-group" style="margin-bottom:10px;">
            <input type="text" id="resetIdentifier" placeholder="Email or username" style="width:100%; padding:12px 16px; border-radius:10px; border:1px solid #dcdcdc;">
        </div>
        <div class="form-group" style="margin-bottom:10px;">
            <input type="password" id="resetPassword" placeholder="New password" style="width:100%; padding:12px 16px; border-radius:10px; border:1px solid #dcdcdc;">
        </div>
        <button class="login-btn" onclick="resetPassword()" style="width:100%;">Reset Password</button>
        <p style="margin-top:10px; font-size:12px; color:#7f8c8d;">This reset helper is for development only and works only when the backend is running in DEBUG mode.</p>
    </div>
</div>

<script>
// Theme toggle for login page
function applyThemeLogin(theme) {
    if (theme === 'dark') document.documentElement.classList.add('dark-mode');
    else document.documentElement.classList.remove('dark-mode');
    localStorage.setItem('theme', theme);
    const btn = document.getElementById('loginThemeToggle');
    if (!btn) return;
    const sun = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    const moon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
    if (theme === 'dark') btn.innerHTML = sun + '<span style="font-size:13px">Light</span>'; else btn.innerHTML = moon + '<span style="font-size:13px">Dark</span>';
}
function toggleThemeLogin() { const cur = localStorage.getItem('theme') || 'light'; applyThemeLogin(cur === 'dark' ? 'light' : 'dark'); }
document.addEventListener('DOMContentLoaded', () => { const saved = localStorage.getItem('theme') || 'light'; applyThemeLogin(saved); const btn = document.getElementById('loginThemeToggle'); if (btn) btn.onclick = toggleThemeLogin; });

function getApiBase() {
    // When served from Django at 127.0.0.1:8000 or localhost, use relative URLs
    // Only use full URL for file:// protocol or when truly cross-origin
    if (location.protocol === 'file:' || location.origin === 'null') {
        return 'http://127.0.0.1:8000';
    }
    // Otherwise use relative URLs (works for same-origin requests)
    return '';
}

function getApiUrl(endpoint, base) {
    const trimmed = endpoint.replace(/^\/?|\/?$/g, '');
    if (base === '') {
        // Relative URL
        return `/api/${trimmed}/`;
    }
    // Absolute URL
    const prefix = base.endsWith('/') ? base.slice(0, -1) : base;
    return `${prefix}/api/${trimmed}/`;
}

async function fetchApi(endpoint, options = {}) {
    const primaryBase = getApiBase();
    const primaryUrl = getApiUrl(endpoint, primaryBase);
    try {
        const response = await fetch(primaryUrl, options);
        if (response.ok || response.status >= 400) {
            return response;
        }
    } catch (error) {
        console.warn('Primary backend fetch failed:', primaryUrl, error);
    }

    // Fallback to absolute URLs if relative didn't work
    const fallbackUrls = [
        `http://127.0.0.1:8000/api/${endpoint.replace(/^\/?|\/?$/g, '')}/`,
        `http://localhost:8000/api/${endpoint.replace(/^\/?|\/?$/g, '')}/`
    ];

    for (const fallbackUrl of fallbackUrls) {
        try {
            const response = await fetch(fallbackUrl, options);
            if (response.ok || response.status >= 400) {
                return response;
            }
        } catch (error) {
            console.warn('Fallback fetch failed:', fallbackUrl, error);
        }
    }

    // If everything failed, throw error
    throw new Error(`Could not connect to backend at ${primaryUrl}`);
}

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Please enter both username and password.");
        return;
    }

    console.log("Login attempt with username:", username);

    try {
        const endpoint = 'login';
        const API_BASE = getApiBase();
        const url = getApiUrl(endpoint, API_BASE);

        console.log("=== LOGIN ATTEMPT ===");
        console.log("  location.protocol:", location.protocol);
        console.log("  location.origin:", location.origin);
        console.log("  location.host:", location.host);
        console.log("  API_BASE:", API_BASE);
        console.log("  Endpoint:", endpoint);
        console.log("  Full URL:", url);

        const response = await fetchApi(endpoint, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        console.log("Response status:", response.status);
        const data = await response.json().catch(() => null);
        console.log("Server response:", data);

        if (!response.ok) {
            const reason = data?.error || data?.status || response.statusText || 'Unknown error';
            alert(`Login failed: ${reason} (status: ${response.status})`);
            return;
        }

        const token = data.access || data.token || null;
        if (token) {
            localStorage.setItem("token", token);
            console.log("Token saved to localStorage");
            alert("Login successful!");
            window.location.href = "index.html";
        } else {
            alert("Login succeeded but no token returned");
        }

    } catch (error) {
        console.error("Login error:", error);
        console.error("Stack:", error.stack);
        alert(`Unable to reach backend. Error: ${error.message}. Check console for details.`);
    }
}

function toggleResetForm() {
    const box = document.getElementById('resetPasswordBox');
    if (!box) return;
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

async function resetPassword() {
    const identifier = document.getElementById('resetIdentifier').value.trim();
    const newPassword = document.getElementById('resetPassword').value.trim();

    if (!identifier || !newPassword) {
        alert('Please enter your email/username and a new password.');
        return;
    }

    try {
        const API_BASE = getApiBase();
        const url = getApiUrl('reset-password', API_BASE);
        const response = await fetchApi('reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: identifier, username: identifier, new_password: newPassword })
        });

        const data = await response.json().catch(() => null);
        if (!response.ok) {
            const reason = data?.error || response.statusText || 'Unknown error';
            alert(`Reset failed: ${reason} (status: ${response.status})`);
            return;
        }

        alert(data?.message || 'Password reset successful. Please login with your new password.');
        document.getElementById('resetPasswordBox').style.display = 'none';
    } catch (error) {
        console.error(error);
        alert('Unable to reach backend. Ensure Django is running at http://127.0.0.1:8000.');
    }
}

// Clear localStorage for testing
function clearStorage() {
    localStorage.clear();
    console.log("LocalStorage cleared");
    alert("LocalStorage cleared. Please try logging in again.");
}
</script>

</body>
</html>
