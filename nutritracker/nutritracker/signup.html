<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NutriTracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo h1 {
            color: #2ecc71;
            font-size: 32px;
            font-weight: bold;
        }

        .tagline {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #2ecc71;
        }

        .form-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
        }

        .form-group input[type="text"] {
            padding: 15px 15px 15px 15px;
        }

        .signup-btn {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            background: #27ae60;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .login-link a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>NutriTracker</h1>
    </div>
    <p class="tagline">Track your nutrition, stay healthy</p>

    <div class="form-group">
        <input type="text" id="username" placeholder="Username">
        <i class="fas fa-user"></i>
    </div>

    <div class="form-group">
        <input type="email" id="email" placeholder="Email">
        <i class="fas fa-envelope"></i>
    </div>

    <div class="form-group">
        <input type="password" id="password" placeholder="Password">
        <i class="fas fa-lock"></i>
    </div>

    <button class="signup-btn" onclick="signup()">Sign Up</button>

    <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
async function signup() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const backendHosts = ['127.0.0.1:8000', 'localhost:8000'];
        const isFileProto = location.protocol === 'file:' || location.origin === 'null';
        const isBackendHost = backendHosts.some(host => location.host === host);
        
        console.log('Signup diagnostics:');
        console.log('  location.protocol:', location.protocol);
        console.log('  location.origin:', location.origin);
        console.log('  location.host:', location.host);
        console.log('  isFileProto:', isFileProto);
        console.log('  isBackendHost:', isBackendHost);
        
        let url;
        if (isFileProto || !isBackendHost) {
            url = `http://127.0.0.1:8000/api/signup/`;
        } else {
            url = `/api/signup/`;
        }
        
        console.log('  Final URL:', url);

        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();
        console.log('  Response status:', response.status);
        console.log('  Response data:', data);

        if (response.status === 200) {
            alert("Signup successful! Now login.");
            window.location.href = "login.html";
        } else {
            alert(data.error || "Signup failed");
        }

    } catch (error) {
        console.error("Signup error:", error);
        alert("Could not reach backend at http://127.0.0.1:8000. Is Django running? Check console for details.");
    }
}
</script>

</body>
</html>
